<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confetti Celebration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        .container {
            z-index: 10;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            backdrop-filter: blur(5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            max-width: 600px;
        }

        button {
            background: #ff4081;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            background: #f50057;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(1px);
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎉 Congratulations! 🎉</h1>
        <p>You've achieved something amazing! Let's celebrate with this colorful confetti explosion!</p>
        <button id="trigger-confetti">Launch Confetti</button>
    </div>
    <canvas id="confetti-canvas"></canvas>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            const triggerButton = document.getElementById('trigger-confetti');

            // Set canvas dimensions
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // Confetti particle class
            class Confetti {
                constructor() {
                    this.reset();
                }

                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * -canvas.height;
                    this.size = Math.random() * 10 + 5;
                    this.speed = Math.random() * 3 + 2;
                    this.angle = Math.random() * 360;
                    this.spin = Math.random() * 10 - 5;
                    this.color = this.getRandomColor();
                    this.shape = Math.floor(Math.random() * 3); // 0: circle, 1: square, 2: rectangle
                    this.wobble = Math.random() * 5;
                    this.wobbleSpeed = Math.random() * 0.1;
                    this.wobbleOffset = Math.random() * Math.PI * 2;
                }

                getRandomColor() {
                    const colors = [
                        '#ff0000', '#00ff00', '#0000ff', '#ffff00',
                        '#ff00ff', '#00ffff', '#ff7700', '#ff0088'
                    ];
                    return colors[Math.floor(Math.random() * colors.length)];
                }

                update() {
                    this.y += this.speed;
                    this.angle += this.spin;
                    this.wobbleOffset += this.wobbleSpeed;
                    this.x += Math.sin(this.wobbleOffset) * this.wobble;

                    // Reset particle if it goes off screen
                    if (this.y > canvas.height + 50) {
                        this.reset();
                    }
                }

                draw() {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.angle * Math.PI / 180);
                    ctx.fillStyle = this.color;

                    switch (this.shape) {
                        case 0: // Circle
                            ctx.beginPath();
                            ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
                            ctx.fill();
                            break;
                        case 1: // Square
                            ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                            break;
                        case 2: // Rectangle
                            ctx.fillRect(-this.size / 2, -this.size / 4, this.size, this.size / 2);
                            break;
                    }

                    ctx.restore();
                }
            }

            // Create confetti particles
            const confettiCount = 200;
            const confettiParticles = [];

            for (let i = 0; i < confettiCount; i++) {
                confettiParticles.push(new Confetti());
            }

            // Animation loop
            function animate() {
                // Clear canvas with a slight fade effect for trailing
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Update and draw each confetti particle
                confettiParticles.forEach(particle => {
                    particle.update();
                    particle.draw();
                });

                requestAnimationFrame(animate);
            }

            // Start animation
            animate();

            // Trigger confetti explosion
            triggerButton.addEventListener('click', function () {
                // Reset all particles to create an explosion effect
                confettiParticles.forEach(particle => {
                    particle.reset();
                });

                // Add a little extra confetti for the explosion
                for (let i = 0; i < 50; i++) {
                    setTimeout(() => {
                        const extraConfetti = new Confetti();
                        confettiParticles.push(extraConfetti);

                        // Remove extra confetti after a while to prevent memory issues
                        setTimeout(() => {
                            const index = confettiParticles.indexOf(extraConfetti);
                            if (index > -1) {
                                confettiParticles.splice(index, 1);
                            }
                        }, 5000);
                    }, i * 50);
                }
            });

            // Auto-trigger confetti after page load
            setTimeout(() => {
                triggerButton.click();
            }, 1000);
        });
    </script>
</body>

</html>
