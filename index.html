<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            font-size: 100px;
            background-color: red;
            color: black;
            text-align: center;
            text-decoration: underline blue 10px wavy;
            text-transform: capitalize;
        }
        p{
            font-size: 80px;
            color: red;
            background-color: black;
            font-weight: bolder;
            text-align: center;
            border: 10px solid red;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <h1>This is heading 1 tag</h1>
    <p>cascading style sheet</p>
</body>
</html>
